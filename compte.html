<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compte - Soulery</title>
  <link rel="stylesheet" href="./style.css?v=6" />
</head>
<body>
  <div class="site-wrap">

    <div class="topbar">
      Bienvenue chez Soulery | Livraison offerte dans toute la France
    </div>

    <header class="header">
      <div class="header-left">
        <a href="index.html" class="icon-btn icon-link" aria-label="Retour">←</a>
      </div>

      <div class="logo-wrap">
        <a href="index.html" class="logo-link">
          <div class="logo">SOULERY</div>
          <div class="logo-sub">depuis 1897</div>
        </a>
      </div>

      <div class="header-right">
        <a href="panier.html" class="icon-btn cart-btn icon-link" aria-label="Panier">
          🛍
          <span class="cart-count">0</span>
        </a>
      </div>
    </header>

    <section class="page-section">
      <h1 class="page-title">Créer un compte</h1>

      <div class="form-card">
        <label>Prénom</label>
        <input type="text" placeholder="Votre prénom" />

        <label>Nom</label>
        <input type="text" placeholder="Votre nom" />

        <label>Email</label>
        <input type="email" placeholder="Votre email" />

        <label>Mot de passe</label>
        <input type="password" placeholder="Votre mot de passe" />

        <button class="btn dark full-btn">Créer mon compte</button>
      </div>

      <p class="helper-text">
        Vous avez déjà un compte ? <a href="#">Se connecter</a>
      </p>
    </section>

    <footer class="footer">
      <p>© 2026 SOULERY - Tous droits réservés</p>
    </footer>

  </div>
</body>
</html>
